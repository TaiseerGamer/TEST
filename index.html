<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Burger Boss: Grill & Serve</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Burger Boss: Grill & Serve</h1>
  
  <div id="game">
    <div id="kitchen">
      <div id="grill"></div>
      <div id="ingredients"></div>
    </div>
    
    <div id="ui">
      <p>Money: $<span id="money">100</span></p>
      <p>Orders Served: <span id="orders">0</span></p>
      
      <button onclick="cookPatty()">Cook Patty</button>
      <button onclick="assembleBurger()">Assemble Burger</button>
      <button onclick="serveCustomer()">Serve Customer</button>
    </div>
    
    <div id="customers"></div>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
