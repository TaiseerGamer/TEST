<!DOCTYPE html>
<html>
<head>
    <title>Burger Cooking Simulator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🍔 Burger Cooking Simulator v0.0.0</h1>

<div class="stats">
    Coins: <span id="coins">0</span>
</div>

<div class="order-box">
    <h2>Customer Order</h2>
    <p id="order">Burger</p>
    <button onclick="newOrder()">New Order</button>
</div>

<div class="kitchen">
    <h2>Kitchen</h2>

    <button onclick="cookPatty()">Cook Patty</button>
    <button onclick="addPatty()">Add Patty</button>
    <button onclick="addLettuce()">Add Lettuce</button>
    <button onclick="addCheese()">Add Cheese</button>
    <button onclick="serveBurger()">Serve Burger</button>
</div>

<div class="burger">
    <h2>Current Burger</h2>
    <ul id="burgerList"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
