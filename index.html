<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Burger Boss: Grill & Serve</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Burger Boss: Grill & Serve</h1>
  
  <div id="game">
    <div id="kitchen">
      <div id="grill"></div>
      <div id="ingredients">
        <button onclick="addIngredient('bun')">Add Bun</button>
        <button onclick="addIngredient('patty')">Add Patty</button>
        <button onclick="addIngredient('cheese')">Add Cheese</button>
        <button onclick="addIngredient('lettuce')">Add Lettuce</button>
      </div>
      <div id="burger"></div>
      <button onclick="assembleBurger()">Assemble Burger</button>
    </div>
    
    <div id="ui">
      <p>Money: $<span id="money">100</span></p>
      <p>Orders Served: <span id="orders">0</span></p>
      <button onclick="newCustomer()">New Customer</button>
    </div>
    
    <div id="customers"></div>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
