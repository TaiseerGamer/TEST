<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Café Cooking Simulator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="topBar">
  <div>Coins: <span id="coins">0</span></div>
  <div>Level: <span id="level">1</span></div>
  <div>XP: <span id="xp">0</span></div>
</div>

<div id="game">

  <div id="customers"></div>

  <div id="kitchen">
    <h3>🍳 Cooking Station</h3>

    <div class="buttonGrid">
      <button onclick="addIngredient('Coffee')">☕ Coffee</button>
      <button onclick="addIngredient('Burger')">🍔 Burger</button>
      <button onclick="addIngredient('Sandwich')">🥪 Sandwich</button>
      <button onclick="addIngredient('Pizza')">🍕 Pizza</button>
      <button onclick="addIngredient('Juice')">🧃 Juice</button>
      <button onclick="serveOrder()">Serve</button>
    </div>

    <div id="currentOrder">
      <h4>Current Order:</h4>
      <div id="orderText">None</div>
    </div>
  </div>

  <div id="rightPanel">
    <h3>⬆ Upgrades</h3>

    <div class="upgrade" onclick="upgrade('speed')">Speed (50💰)</div>
    <div class="upgrade" onclick="upgrade('tips')">Tips (75💰)</div>
    <div class="upgrade" onclick="upgrade('capacity')">Capacity (100💰)</div>

  </div>

</div>

<script src="game.js"></script>
</body>
</html>
